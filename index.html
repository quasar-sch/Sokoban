<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>SOKOBAN: PERFECT 8 STAGES</title>
<style>
  :root {
    --bg-space: #050814;
    --board-bg: rgba(15, 23, 42, 0.7);
    --neon-cyan: #22d3ee;
    --neon-cyan-dim: rgba(34, 211, 238, 0.15);
    
    --tile-size: 50px;
    --board-width: 300px;
    --board-height: 300px;
  }

  * { box-sizing: border-box; overscroll-behavior: none; user-select: none; -webkit-user-select: none; }

  body {
    margin: 0; width: 100vw; height: 100vh; overflow: hidden;
    background: radial-gradient(circle at 50% 30%, #1e1b4b, var(--bg-space));
    font-family: system-ui, -apple-system, sans-serif;
    color: #e2e8f0; touch-action: none; display: flex; flex-direction: column; align-items: center; justify-content: center;
  }

  /* --- UI 오버레이 --- */
  .overlay {
    position: fixed; inset: 0; z-index: 50;
    background: rgba(5, 8, 20, 0.9); backdrop-filter: blur(10px);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    transition: opacity 0.3s ease;
  }
  .overlay.hidden { opacity: 0; pointer-events: none; }

  .title-glow {
    font-size: clamp(40px, 8vw, 70px); font-weight: 900; letter-spacing: 0.1em; margin: 0 0 20px 0;
    color: var(--neon-cyan); text-shadow: 0 0 20px rgba(34, 211, 238, 0.6); text-align: center;
  }

  .stats-box {
    background: rgba(15, 23, 42, 0.8); border: 1px solid var(--neon-cyan);
    padding: 24px 48px; border-radius: 12px; text-align: center; margin-bottom: 30px;
    box-shadow: 0 0 15px var(--neon-cyan-dim);
  }
  .stats-box h2 { margin: 0 0 15px 0; color: #f8fafc; font-size: 26px; }
  .stats-box p { margin: 8px 0; font-size: 20px; color: #94a3b8; font-weight: bold; }
  .stats-box span { color: var(--neon-cyan); }

  .btn-primary {
    background: rgba(34, 211, 238, 0.1); border: 2px solid var(--neon-cyan); color: var(--neon-cyan);
    padding: 18px 48px; border-radius: 8px; font-size: 22px; font-weight: 800; letter-spacing: 0.1em;
    cursor: pointer; transition: all 0.2s; box-shadow: 0 0 15px var(--neon-cyan-dim);
  }
  .btn-primary:active { transform: scale(0.95); background: var(--neon-cyan); color: #000; }

  /* --- 인게임 화면 --- */
  .hud {
    position: absolute; top: max(3vh, env(safe-area-inset-top)); left: 0; width: 100%;
    display: flex; justify-content: space-between; padding: 0 5vw; z-index: 10;
  }
  .hud-item { font-size: clamp(20px, 3.5vw, 28px); font-weight: 900; color: var(--neon-cyan); text-shadow: 0 0 8px var(--neon-cyan-dim); }

  /* 탑다운 뷰 컨테이너 (태블릿 화면 꽉 차게) */
  .board-container {
    padding: 12px; background: var(--board-bg);
    border-radius: 16px; border: 2px solid rgba(34, 211, 238, 0.4);
    box-shadow: 0 0 40px rgba(34, 211, 238, 0.15);
  }

  .board {
    position: relative; width: var(--board-width); height: var(--board-height);
    background-image: 
      linear-gradient(var(--neon-cyan-dim) 1px, transparent 1px),
      linear-gradient(90deg, var(--neon-cyan-dim) 1px, transparent 1px);
    background-size: var(--tile-size) var(--tile-size);
  }

  /* 엔티티 공통 */
  .entity {
    position: absolute; width: var(--tile-size); height: var(--tile-size);
    display: flex; align-items: center; justify-content: center;
    transition: left 0.1s linear, top 0.1s linear;
  }

  /* 네온 벽 */
  .wall-inner {
    width: 100%; height: 100%; background: rgba(34, 211, 238, 0.08);
    border: 2px solid var(--neon-cyan); border-radius: 4px;
    box-shadow: inset 0 0 10px rgba(34, 211, 238, 0.3);
  }

  /* 타겟 */
  .target-inner {
    width: 35%; height: 35%; border: 3px dashed #fb7185; border-radius: 50%;
    box-shadow: 0 0 12px rgba(251, 113, 133, 0.6);
  }

  /* 상자 */
  .box-inner {
    width: 80%; height: 80%; background: #facc15; border-radius: 6px;
    border: 2px solid #ca8a04; box-shadow: 0 0 15px rgba(250, 204, 21, 0.4);
    transition: background 0.2s, box-shadow 0.2s, border-color 0.2s;
  }
  .box-inner.solved { background: #34d399; border-color: #059669; box-shadow: 0 0 20px rgba(52, 211, 153, 0.8); }

  /* 플레이어 */
  .player-inner {
    width: 70%; height: 70%; background: #e879f9; border-radius: 50%;
    border: 3px solid #c026d3; box-shadow: 0 0 20px rgba(232, 121, 249, 0.6);
  }

  .controls {
    position: absolute; bottom: max(3vh, env(safe-area-inset-bottom)); width: 100%;
    display: flex; justify-content: center; gap: 20px; z-index: 10;
  }
  .btn-icon {
    background: rgba(15, 23, 42, 0.8); border: 1px solid var(--neon-cyan); color: var(--neon-cyan);
    width: 66px; height: 66px; border-radius: 33px; font-size: 32px; display: grid; place-items: center;
    cursor: pointer; backdrop-filter: blur(4px); box-shadow: 0 0 10px var(--neon-cyan-dim);
  }
  .btn-icon:active { background: var(--neon-cyan); color: #000; transform: scale(0.9); }
  
  #cheatToast {
    position: fixed; top: 15vh; background: #fb7185; color: #fff; padding: 10px 20px; 
    border-radius: 8px; font-weight: bold; font-size: 18px; opacity: 0; transition: opacity 0.2s; z-index: 100;
  }
</style>
</head>
<body>

  <div id="mainMenu" class="overlay">
    <h1 class="title-glow">NEON SOKOBAN</h1>
    <button class="btn-primary" onclick="startGame()">START GAME</button>
  </div>

  <div id="clearMenu" class="overlay hidden">
    <h1 class="title-glow" style="color: #34d399; text-shadow: 0 0 20px rgba(52,211,153,0.6);">CLEARED!</h1>
    <div class="stats-box">
      <h2 id="clearStageText">STAGE 1</h2>
      <p>TIME: <span id="clearTime">00:00</span></p>
      <p>MOVES: <span id="clearMoves">0</span></p>
    </div>
    <button class="btn-primary" onclick="nextStage()">NEXT STAGE</button>
  </div>

  <div id="allClearMenu" class="overlay hidden">
    <h1 class="title-glow" style="color: #facc15; text-shadow: 0 0 20px rgba(250,204,21,0.6);">ALL CLEARED!</h1>
    <div class="stats-box">
      <h2>FINAL RECORD</h2>
      <p>TOTAL TIME: <span id="finalTime">00:00</span></p>
      <p>TOTAL MOVES: <span id="finalMoves">0</span></p>
    </div>
    <button class="btn-primary" onclick="goToMain()">MAIN MENU</button>
  </div>

  <div class="hud">
    <div id="hudStage" class="hud-item">STAGE 1</div>
    <div class="hud-item">
      <span style="margin-right:15px">⏱ <span id="hudTime">00:00</span></span>
      <span>⛙ <span id="hudMoves">0</span></span>
    </div>
  </div>

  <div id="cheatToast">CHEAT ARMED</div>

  <div class="board-container">
    <div class="board" id="board"></div>
  </div>

  <div class="controls">
    <button class="btn-icon" onclick="resetStage()" title="Restart Stage">↻</button>
  </div>

<script>
  // 사용자가 제공한 8개의 이미지를 1:1 픽셀 매칭으로 완벽하게 파싱한 배열
  const levels = [
    [ // Image 1 (십자가 타겟 및 상자 배치)
      " ###   ",
      "##.####",
      "#  $ .#",
      "#.$@$##",
      "#  $ # ",
      "##  .# ",
      " ##### "
    ],
    [ // Image 2 (좌측 세로 타겟 3개, 우측 하단 플레이어)
      "###### ",
      "#    # ",
      "# .$ # ",
      "##.$###",
      " #.$  #",
      " #  @ #",
      " #  ###",
      " ####   "
    ],
    [ // Image 3 (좌측 S자형 타겟, 우측 산개된 상자)
      " ####  #### ",
      "##  ####  ##",
      "#       $  #",
      "# ..# $  $@#",
      "# . ####$$ #",
      "#.. #  #   #",
      "#####  #####"
    ],
    [ // Image 4 (우측 하단 타겟 4개, 가로 상자 배열)
      "#####       ",
      "  #         ",
      "#####       ",
      "#   ##      ",
      "# @  #######",
      "#  #$$ $ $ #",
      "#          #",
      "#    ####..#",
      "#    #  #..#",
      "#    #  ####",
      "######      "
    ],
    [ // Image 5 (상단 뚫린 공간, 타겟/상자 직렬 배치)
      "##### #####",
      "#  @# #   #",
      "# $$### $ #",
      "# ..   .  #",
      "###########"
    ],
    [ // Image 6 (우측 대형 타겟 구역 6개)
      "    #####          ",
      "    #   #          ",
      "    #$  #          ",
      "  ###  $##         ",
      "  #  $ $ #         ",
      "### # ## #   ######",
      "#   # ## #####  ..#",
      "# $  $          ..#",
      "##### ### #@##  ..#",
      "    #     #########",
      "    #######        ",
      "                  "
    ],
    [ // Image 7 (중앙 타겟 6개, 대칭 십자형 구조)
      "###########",
      "#     # @ #",
      "# $  $  $ #",
      "## #...# ##",
      " # #...# # ",
      " #$ ### $# ",
      " #   $   # ",
      " #  ##   # ",
      " ######### "
    ],
    [ // Image 8 (우측 지그재그 벽, 좌측 상단 타겟 3개)
      "#######",
      "#. .#.#",
      "#     #",
      "# #   #",
      "# #$###",
      "#  $  #",
      "###$# #",
      "#  @# #",
      "#     #",
      "#######"
    ],
  ];

  let currentStage = 0;
  let mapWidth = 0, mapHeight = 0, tileSize = 50;
  let walls = [], targets = [], boxes = [];
  let player = { x: 0, y: 0, el: null };
  let moves = 0, timerInterval = null, seconds = 0;
  let totalMoves = 0, totalSeconds = 0;
  let isGameOver = false, isPlaying = false;

  const boardEl = document.getElementById('board');
  const cheatToast = document.getElementById('cheatToast');

  function hide(id) { document.getElementById(id).classList.add('hidden'); }
  function show(id) { document.getElementById(id).classList.remove('hidden'); }
  function formatTime(sec) { return `${String(Math.floor(sec / 60)).padStart(2, '0')}:${String(sec % 60).padStart(2, '0')}`; }

  function startGame() { 
    hide('mainMenu'); 
    currentStage = 0; 
    totalMoves = 0;
    totalSeconds = 0;
    loadStage(currentStage); 
  }

  function goToMain() {
    hide('allClearMenu');
    show('mainMenu');
  }

  function nextStage() {
    hide('clearMenu');
    currentStage++;
    if (currentStage >= levels.length) {
      // 8개 스테이지 모두 클리어 시
      document.getElementById('finalTime').innerText = formatTime(totalSeconds);
      document.getElementById('finalMoves').innerText = totalMoves;
      show('allClearMenu');
      isPlaying = false;
      return;
    }
    loadStage(currentStage);
  }
  
  function prevStage() {
    if(currentStage > 0) { currentStage--; loadStage(currentStage); }
  }

  function resetStage() { if (isPlaying) loadStage(currentStage); }

  function calculateTileSize() {
    // 태블릿 화면을 꽉 채우기 위한 동적 스케일링
    const availableWidth = window.innerWidth * 0.95;
    const availableHeight = window.innerHeight * 0.75; 
    
    const maxTileW = availableWidth / mapWidth;
    const maxTileH = availableHeight / mapHeight;
    
    // 타일이 너무 작아지는 것을 방지하고, 화면을 꽉 채우도록 최대 크기를 150px까지 늘림
    tileSize = Math.floor(Math.min(maxTileW, maxTileH, 150)); 
    
    document.documentElement.style.setProperty('--tile-size', `${tileSize}px`);
    document.documentElement.style.setProperty('--board-width', `${mapWidth * tileSize}px`);
    document.documentElement.style.setProperty('--board-height', `${mapHeight * tileSize}px`);
    
    // 스케일링 변경 시 기존 요소들 위치 실시간 재조정
    document.querySelectorAll('.entity').forEach(el => {
      const x = parseInt(el.dataset.x);
      const y = parseInt(el.dataset.y);
      el.style.left = `${x * tileSize}px`;
      el.style.top = `${y * tileSize}px`;
    });
  }

  window.addEventListener('resize', () => {
    if (isPlaying) calculateTileSize();
  });

  function loadStage(stageIndex) {
    boardEl.innerHTML = '';
    walls = []; targets = []; boxes = [];
    moves = 0; seconds = 0; isGameOver = false; isPlaying = true;
    
    clearInterval(timerInterval);
    document.getElementById('hudTime').innerText = "00:00";
    document.getElementById('hudMoves').innerText = "0";
    document.getElementById('hudStage').innerText = `STAGE ${stageIndex + 1}`;
    timerInterval = setInterval(() => { seconds++; document.getElementById('hudTime').innerText = formatTime(seconds); }, 1000);

    const levelData = levels[stageIndex];
    mapHeight = levelData.length;
    mapWidth = Math.max(...levelData.map(row => row.length));

    calculateTileSize(); 

    for (let y = 0; y < mapHeight; y++) {
      const row = levelData[y];
      for (let x = 0; x < mapWidth; x++) {
        const char = x < row.length ? row[x] : ' ';
        if (char === '#') { createEntity('wall', x, y, '<div class="wall-inner"></div>'); walls.push({x, y}); }
        if (char === '.' || char === '*' || char === '+') { createEntity('target', x, y, '<div class="target-inner"></div>'); targets.push({x, y}); }
        if (char === '$' || char === '*') { const el = createEntity('box', x, y, '<div class="box-inner"></div>'); boxes.push({x, y, el}); }
        if (char === '@' || char === '+') { player.el = createEntity('player', x, y, '<div class="player-inner"></div>'); player.x = x; player.y = y; }
      }
    }
    checkWinCondition();
  }

  function createEntity(type, x, y, innerHTML) {
    const el = document.createElement('div');
    el.className = `entity ${type}`;
    el.innerHTML = innerHTML;
    el.dataset.x = x;
    el.dataset.y = y;
    el.style.left = `${x * tileSize}px`; 
    el.style.top = `${y * tileSize}px`;
    boardEl.appendChild(el); return el;
  }

  function getBoxAt(x, y) { return boxes.find(b => b.x === x && b.y === y); }
  function isWall(x, y) { return walls.some(w => w.x === x && w.y === y); }

  function movePlayer(dx, dy) {
    if (isGameOver || !isPlaying) return;
    const nx = player.x + dx; const ny = player.y + dy;

    if (isWall(nx, ny)) return;

    const box = getBoxAt(nx, ny);
    if (box) {
      const bnx = nx + dx; const bny = ny + dy;
      if (isWall(bnx, bny) || getBoxAt(bnx, bny)) return;
      box.x = bnx; box.y = bny;
      box.el.dataset.x = bnx; box.el.dataset.y = bny;
      box.el.style.left = `${bnx * tileSize}px`; box.el.style.top = `${bny * tileSize}px`;
    }

    player.x = nx; player.y = ny;
    player.el.dataset.x = nx; player.el.dataset.y = ny;
    player.el.style.left = `${nx * tileSize}px`; player.el.style.top = `${ny * tileSize}px`;
    
    moves++; document.getElementById('hudMoves').innerText = moves;
    checkWinCondition();
  }

  function checkWinCondition() {
    let solvedCount = 0;
    boxes.forEach(box => {
      const isSolved = targets.some(t => t.x === box.x && t.y === box.y);
      if (isSolved) { box.el.querySelector('.box-inner').classList.add('solved'); solvedCount++; } 
      else { box.el.querySelector('.box-inner').classList.remove('solved'); }
    });

    if (solvedCount === targets.length && targets.length > 0) {
      isGameOver = true; clearInterval(timerInterval);
      
      totalMoves += moves;
      totalSeconds += seconds;

      setTimeout(() => {
        document.getElementById('clearStageText').innerText = `STAGE ${currentStage + 1} CLEARED!`;
        document.getElementById('clearTime').innerText = formatTime(seconds);
        document.getElementById('clearMoves').innerText = moves;
        show('clearMenu');
      }, 300); 
    }
  }

  // --- 치트키 및 조작 ---
  let cheatArmed = false;
  let cheatTimer = null;

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Backquote' || e.key === '₩') {
      cheatArmed = true;
      cheatToast.style.opacity = '1';
      clearTimeout(cheatTimer);
      cheatTimer = setTimeout(() => { cheatArmed = false; cheatToast.style.opacity = '0'; }, 1500);
      return;
    }

    if (cheatArmed && isPlaying) {
      if (e.key === 'ArrowRight') { nextStage(); cheatArmed = false; cheatToast.style.opacity = '0'; return; }
      if (e.key === 'ArrowLeft') { prevStage(); cheatArmed = false; cheatToast.style.opacity = '0'; return; }
      if (e.key === 'Enter') {
        for(let i=0; i<targets.length; i++) {
          if(boxes[i]) {
            boxes[i].x = targets[i].x; boxes[i].y = targets[i].y;
            boxes[i].el.dataset.x = targets[i].x; boxes[i].el.dataset.y = targets[i].y;
            boxes[i].el.style.left = `${boxes[i].x * tileSize}px`;
            boxes[i].el.style.top = `${boxes[i].y * tileSize}px`;
          }
        }
        checkWinCondition();
        cheatArmed = false; cheatToast.style.opacity = '0';
        return;
      }
    }

    switch(e.key) {
      case 'ArrowUp': case 'w': movePlayer(0, -1); break;
      case 'ArrowDown': case 's': movePlayer(0, 1); break;
      case 'ArrowLeft': case 'a': movePlayer(-1, 0); break;
      case 'ArrowRight': case 'd': movePlayer(1, 0); break;
    }
  });

  // 태블릿 스와이프 조작
  let touchStartX = 0, touchStartY = 0;
  window.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; touchStartY = e.changedTouches[0].screenY; });
  window.addEventListener('touchend', e => {
    let dx = e.changedTouches[0].screenX - touchStartX; let dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) > 30 || Math.abs(dy) > 30) {
      if (Math.abs(dx) > Math.abs(dy)) movePlayer(dx > 0 ? 1 : -1, 0);
      else movePlayer(0, dy > 0 ? 1 : -1);
    }
  });
</script>
</body>
</html>

```
